  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #E8F4FD 0%, #EDE9FE 100%);
      color: #1E293B;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 460px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 32px;
      padding: 40px 28px;

    .logo { width: 120px; height: 120px; object-fit: contain; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px; }
    .accent { color: #5B9BD5; }
    p { font-size: 16px; line-height: 1.6; color: #475569; margin-bottom: 28px; }
    .cta {
      display: inline-block;
      background: linear-gradient(135deg, #5B9BD5, #9B8EC4);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(91, 155, 213, 0.35);
      transition: transform 0.15s ease;
    }
    .cta:active { transform: scale(0.97); }
    .footer { margin-top: 24px; font-size: 12px; color: #94A3B8; }
    .badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
    .badge {
      font-size: 12px; font-weight: 600; color: #5B9BD5;
      background: rgba(91, 155, 213, 0.1); padding: 6px 14px; border-radius: 999px;
    }
