name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  animaapp:
    name: AnimaApp (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AnimaApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AnimaApp/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test --if-present

  admin-dashboard:
    name: Admin Dashboard (lint · typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anima-admin-dashboard
    env:
      # Valores dummy: el build/typecheck no necesita un Supabase real.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anima-admin-dashboard/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
